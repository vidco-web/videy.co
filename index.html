<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videy Milik Kita</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: black;
}

.header {
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

.start-screen {
    text-align: center;
    padding: 60px 20px;
}

.start-btn {
    margin-top: 20px;
    background: black;
    color: white;
    border: none;
    padding: 14px 25px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
}

.loading {
    display: none;
    margin-top: 20px;
    color: #666;
}

.video-container {
    display: none;
    width: 100%;
    max-width: 400px;
    margin: 20px auto 80px;
    position: relative;
}

/* FOTO */
.fake-video {
    width: 100%;
    aspect-ratio: 9 / 16;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    background: black;
    cursor: pointer;
}

.fake-video img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TOMBOL PLAY */
.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.play-button::before {
    content: "";
    border-style: solid;
    border-width: 15px 0 15px 25px;
    border-color: transparent transparent transparent white;
    margin-left: 5px;
}

.telegram-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #fff;
    border-top: 1px solid #ddd;
    padding: 10px;
    text-align: center;
    display: none;
}

.telegram-btn {
    background: #0088cc;
    color: white;
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header"><b>videy.co</b></div>

<div class="start-screen" id="startScreen">
    <h2>Lanjutkan Menonton Video?</h2>
    <p>Klik tombol di bawah untuk memulai.</p>
    <button class="start-btn" onclick="startVideo()">▶ Mulai Menonton</button>
    <div class="loading" id="loadingText">Memuat...</div>
</div>

<div class="video-container" id="videoContainer">

    <!-- FOTO SEPERTI VIDEO -->
    <div class="fake-video" id="fakeVideo">
        <img src="kamu.jpg" alt="Thumbnail">
        <div class="play-button"></div>
    </div>

</div>

<div class="telegram-bar" id="telegramBar">
    <a href="#" onclick="joinTelegram()" class="telegram-btn">Join Telegram</a>
</div>

<script>
const ADS_LINK = "https://www.profitablecpmratenetwork.com/jc4bzkf1?key=51e86312c82641cb4638ec283e05655d";
const TELEGRAM_LINK = "https://www.profitablecpmratenetwork.com/jc4bzkf1?key=51e86312c82641cb4638ec283e05655d";

let lastAdTime = 0;

// 🔒 Anti spam (8 detik sekali)
function showAds() {
    let now = Date.now();
    if (now - lastAdTime > 8000) {
        lastAdTime = now;
        window.open(ADS_LINK, "_blank");
    }
}

// Start
function startVideo() {
    showAds();

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("videoContainer").style.display = "block";
    document.getElementById("telegramBar").style.display = "block";
}

// Telegram
function joinTelegram() {
    showAds();
    setTimeout(() => {
        window.open(TELEGRAM_LINK, "_blank");
    }, 1000);
}

// Klik foto
window.onload = function() {

    const fakeVideo = document.getElementById("fakeVideo");

    // Saat foto di klik
    fakeVideo.addEventListener("click", function() {
        showAds();
    });

    // Klik layar mana saja
    document.body.addEventListener("click", function(e) {
        if (!e.target.classList.contains("telegram-btn")) {
            showAds();
        }
    });
};
</script>

<script src="https://pl29230729.profitablecpmratenetwork.com/61/a1/53/61a15305a9c35c8bcb531d48026d8b84.js"></script>

</body>
</html>
